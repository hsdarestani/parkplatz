server {
  listen 443 ssl http2;
  server_name parkplatz.smarbiz.sbs;
  root /var/www/parkplatz;
  location /api/ { proxy_pass http://127.0.0.1:8000/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_connect_timeout 10s; proxy_read_timeout 60s; client_max_body_size 2m; }
  location = /index.html { add_header Cache-Control "no-store"; }
  location ~* \.(js|css|png|svg|woff2)$ { expires 30d; add_header Cache-Control "public, immutable"; }
  location / { try_files $uri $uri/ /index.html; }
}
