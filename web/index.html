  <meta property="og:description" content="Private Stellplätze finden, buchen und nach Bestätigung den Parking Pass erhalten.">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>FREIRAUM · Ankommen, ohne zu suchen.</title>
  <link rel="canonical" href="https://parkplatz.smarbiz.sbs/">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    html, body { width: 100%; min-height: 100%; margin: 0; overflow: hidden; }
    body { background: #F5F2EA; }
  </style>
</head>
<body>
  <noscript>FREIRAUM benötigt JavaScript.</noscript>
  <script>
    (async function () {
      const resetKey = 'freiraum-cache-reset-20260719-mobile-v4';

      if (window.location.hash.startsWith('#/')) {
        const legacyPath = window.location.hash.slice(1);
        const nextPath = window.location.pathname === '/'
          ? legacyPath
          : window.location.pathname;
        window.history.replaceState(null, '', nextPath + window.location.search);
      }

      try {
        if ('serviceWorker' in navigator) {
          const hadController = Boolean(navigator.serviceWorker.controller);
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));

          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }

          if (hadController && sessionStorage.getItem(resetKey) !== 'done') {
            sessionStorage.setItem(resetKey, 'done');
            window.location.reload();
            return;
          }
        }
      } catch (error) {
        console.warn('FREIRAUM cache reset warning:', error);
      }

      const script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
