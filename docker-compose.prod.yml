services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes: [freiraum_postgres:/var/lib/postgresql/data]
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    ports: ["127.0.0.1:8000:8000"]
    depends_on: [db]
volumes: {freiraum_postgres: {}}
