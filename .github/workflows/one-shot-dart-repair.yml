name: One-shot Dart source repair

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Remove invalid const from Semantics
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/booking/presentation/booking_screens.dart')
          source = path.read_text()
          old = 'child: const Semantics('
          new = 'child: Semantics('
          count = source.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one invalid Semantics const, found {count}')
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit repaired source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/booking/presentation/booking_screens.dart
          git commit -m 'fix: remove invalid const from beta semantics banner'
          git push origin HEAD:main
