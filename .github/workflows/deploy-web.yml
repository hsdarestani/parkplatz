name: Build and Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parkplatz-production
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freiraum
          POSTGRES_USER: freiraum
          POSTGRES_PASSWORD: freiraum
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U freiraum" --health-interval 5s
          --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://freiraum:freiraum@localhost:5432/freiraum
      JWT_SECRET: ci-only-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[test]'
      - run: ruff check app tests
      - run: alembic upgrade head
      - run: python -m app.db.seed && python -m app.db.seed
      - run: pytest
      - name: Build backend image
        working-directory: .
        run: docker build -t freiraum-api:${GITHUB_SHA} backend

  build-and-deploy:
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_BACKEND_ENABLED: ${{ secrets.DEPLOY_BACKEND_ENABLED }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Parse Dart sources and report formatting
        run: dart format --output=none lib test

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build Flutter Web without PWA service-worker cache
        run: flutter build web --release --base-href / --pwa-strategy=none --dart-define=API_BASE_URL=/api --dart-define=ALLOW_LOCAL_BOOKING_FALLBACK=true

      - name: Add immutable deployment cache keys
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          sha = os.environ['GITHUB_SHA']
          build_dir = Path('build/web')
          index = build_dir / 'index.html'
          bootstrap = build_dir / 'flutter_bootstrap.js'

          index_text = index.read_text()
          if 'flutter_bootstrap.js' not in index_text:
              raise SystemExit('flutter_bootstrap.js reference not found in index.html')
          index.write_text(
              index_text.replace(
                  'flutter_bootstrap.js',
                  f'flutter_bootstrap.js?v={sha}',
                  1,
              )
          )

          bootstrap_text = bootstrap.read_text()
          if 'main.dart.js' not in bootstrap_text:
              raise SystemExit('main.dart.js reference not found in flutter_bootstrap.js')
          bootstrap.write_text(
              bootstrap_text.replace(
                  'main.dart.js',
                  f'main.dart.js?v={sha}',
                  1,
              )
          )

          (build_dir / 'build-version.json').write_text(
              json.dumps({'commit': sha}, separators=(',', ':')) + '\n'
          )
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parkplatz-web-${{ github.sha }}
          path: build/web
          retention-days: 7
          if-no-files-found: error

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/parkplatz_deploy
          chmod 600 ~/.ssh/parkplatz_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static build
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/parkplatz_deploy" \
            build/web/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/parkplatz/"

      - name: Deploy backend when enabled
        if: env.DEPLOY_BACKEND_ENABLED == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          rsync -az -e "ssh -i ~/.ssh/parkplatz_deploy" backend ops docker-compose.prod.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/srv/parkplatz/"
          ssh -i ~/.ssh/parkplatz_deploy "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'cd /srv/parkplatz && ./ops/deploy-backend.sh'
          curl --fail --retry 10 --retry-delay 3 https://parkplatz.smarbiz.sbs/api/health

      - name: Verify deployment
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 10 --retry-delay 3 \
            "https://parkplatz.smarbiz.sbs/?deploy=${GITHUB_SHA}" > /dev/null
          curl --fail --show-error --silent --retry 10 --retry-delay 3 \
            "https://parkplatz.smarbiz.sbs/build-version.json?deploy=${GITHUB_SHA}" \
            | grep --fixed-strings "${GITHUB_SHA}"
          echo "Deployment verified: https://parkplatz.smarbiz.sbs/"
