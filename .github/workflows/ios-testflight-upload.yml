name: Build and Upload FREIRAUM to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Unique App Store build number'
        required: true
        default: '1'

permissions:
  contents: read

concurrency:
  group: parkplatz-ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-26
    timeout-minutes: 50
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - name: Verify required Apple secrets
        run: |
          set -euo pipefail
          test -n "$APPLE_TEAM_ID"
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_PRIVATE_KEY"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Select App Store compatible Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate and prepare iOS project
        run: |
          set -euo pipefail
          rm -rf ios
          flutter create \
            --platforms=ios \
            --org de.freiraum \
            --project-name freiraum_parking \
            .
          python3 -m pip install --disable-pip-version-check pillow
          python3 tool/prepare_ios_release.py
          cd ios
          pod install --repo-update

      - name: Configure App Store Connect API key
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          printf '%s' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Flutter release framework
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=0.9.0 \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL=https://parkplatz.smarbiz.sbs/api \
            --dart-define=ALLOW_LOCAL_BOOKING_FALLBACK=false

      - name: Archive signed iPhone app
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MARKETING_VERSION=0.9.0 \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive

      - name: Export App Store IPA
        run: |
          set -euo pipefail
          cat > build/ios/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist build/ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          IPA="$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)"
          test -n "$IPA"
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"

      - name: Validate IPA with App Store Connect
        run: |
          xcrun altool \
            --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: freiraum-ios-0.9.0-${{ inputs.build_number }}
          path: ${{ env.IPA_PATH }}
          retention-days: 14
          if-no-files-found: error
