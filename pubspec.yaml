name: freiraum_parking
description: FREIRAUM parking sharing marketplace for Germany.
publish_to: 'none'
version: 0.9.2+3
environment:
  sdk: '>=3.4.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  http: ^1.2.2
  http_parser: ^4.1.2
  flutter_secure_storage: ^9.2.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/illustrations/
    - assets/icons/
